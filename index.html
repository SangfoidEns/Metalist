<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Реєстрація гравця</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: sans-serif; background-color: #121212; color: white; padding: 20px; }
        input, select { 
            width: 100%; padding: 12px; margin: 10px 0; 
            border-radius: 8px; border: 1px solid #333; 
            background: #1e1e1e; color: white; box-sizing: border-box;
        }
        .btn { 
            background: #2ecc71; color: white; border: none; 
            padding: 15px; width: 100%; border-radius: 10px; 
            font-weight: bold; font-size: 16px; margin-top: 20px;
        }
        label { font-size: 14px; color: #aaa; }
    </style>
</head>
<body>
    <h2>📝 Реєстрація в клубі</h2>
    
    <label>Прізвище та Ім'я</label>
    <input type="text" id="fullname" placeholder="Наприклад: Іван Петренко">

    <label>Дата народження</label>
    <input type="date" id="birthdate">

    <label>Ігровий номер</label>
    <input type="number" id="number" placeholder="10">

    <label>Позиція</label>
    <select id="position">
        <option value="Воротар">Воротар</option>
        <option value="Захисник">Захисник</option>
        <option value="Півзахисник">Півзахисник</option>
        <option value="Нападник">Нападник</option>
    </select>

    <label>Команда де грає</label>
    <input type="text" id="team" placeholder="Наприклад: ФК Динамо">

    <label>Робоча нога</label>
    <select id="workingLeg">
        <option value="Ліва">Ліва</option>
        <option value="Права">Права</option>
        <option value="Обидві">Обидві</option>
    </select>

    <button class="btn" onclick="register()">Зберегти профіль</button>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        function register() {
            const name = document.getElementById('fullname').value;
            const birthdate = document.getElementById('birthdate').value;
            const num = document.getElementById('number').value;
            const pos = document.getElementById('position').value;
            const team = document.getElementById('team').value;
            const leg = document.getElementById('workingLeg').value;

            if(!name || !birthdate || !num || !team) {
                alert("Будь ласка, заповніть усі поля");
                return;
            }

            const data = {
                type: 'registration',
                name: name,
                birthdate: birthdate,
                number: num,
                position: pos,
                team: team,
                workingLeg: leg
            };

            tg.sendData(JSON.stringify(data));
            tg.close();
        }
    </script>
</body>
</html>
